            --warning-glow: rgba(245, 158, 11, 0.1);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.1);
            --font-sans: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(192, 132, 252, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto 2.5rem auto;
            text-align: center;
        }

        .header-container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header-container p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .main-layout {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* 步骤列表导航 */
        .step-list-container {
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            position: sticky;
            top: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .step-list-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .step-list-title span {
            background: var(--accent-glow);
            color: var(--accent-secondary);
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(192, 132, 252, 0.2);
        }

        .step-nav {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .step-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            color: var(--text-secondary);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }

        .step-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .step-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.1);
        }

        .step-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .step-btn.active .step-badge {
            background: var(--accent-primary);
            color: white;
        }

        .step-btn-text {
            font-weight: 600;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .step-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .step-btn.active svg {
            opacity: 1;
            transform: translateX(3px);
        }

        /* 核心详情显示区 */
        .step-detail-container {
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            min-height: 550px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

            flex-direction: column;
            gap: 2rem;

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .detail-title-group h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .detail-subtitle {
            color: var(--accent-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-module-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.8rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-module-badge a {
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .detail-module-badge a:hover {
            text-decoration: underline;
        }

        /* 详情小节样式 */
        .detail-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-secondary);
        }

        .section-body {
            color: var(--text-secondary);
            font-size: 0.95rem;
            padding-left: 1.75rem;
        }

        /* 输入输出文件列表 */
        .io-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .io-grid {
                grid-template-columns: 1fr;
            }
        }

        .io-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
        }

        .io-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .io-card-title.input { color: var(--accent-secondary); }
        .io-card-title.output { color: var(--success); }

        .io-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .io-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .io-item a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .io-item a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .io-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .input .io-dot { background: var(--accent-secondary); }
        .output .io-dot { background: var(--success); }

        /* 示例面板 */
        .code-panel {
            background: #07090e;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            overflow-x: auto;
            color: #d1d5db;
            position: relative;
        }

        .code-header {
            position: absolute;
            top: 0.5rem;
            right: 1rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 顶部导航与大纲 */
        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer-note a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
        }

        .footer-note a:hover {
            color: var(--text-primary);
        }
    </style>

                moduleName: "raw_input_loader",
                modulePath: "file:///Users/lihan/Project/Vibe_Tracing/src/vibe_tracing/raw_input_loader.py",
                description: "扫描工作区根目录，加载来自产品线、架构设计、开发记录以及第三方工具的所有原始分析底座材料。对可选文件和必需文件进行区分加载，保证输入存在性。",

                    { name: "agent_claims.json", path: "file:///Users/lihan/Project/Vibe_Tracing/raw/04_claims/agent_claims.json" }

                inputs: [

                explanation: "在追溯分析中，如果 Agent 在 `agent_claims.json` 中自称某个任务已做完，但实际上测试套件里根本找不到执行通过且带有对应 `covers` 标签的测试证据，或者 Claim 提及的代码文件的修改时间在 Claim 时间戳之后（Claim Outdated），就会产生 Gaps。",
                example: `# 检查 Claim 与代码路径是否对应\nfor claim in claims:\n    for code_ref in claim.code_refs:\n        if not Path(code_ref).exists():\n            gaps.append({"item_id": claim.claim_id, "reason": f"代码文件 {code_ref} 不存在"})`
            },
            {
                id: 8,
                title: "静态架构合规校验 (Architecture Compliance Checker)",
                subtitle: "Phase 08 — 架构红线合规",
                moduleName: "architecture_compliance_checker",
                modulePath: "file:///Users/lihan/Project/Vibe_Tracing/src/vibe_tracing/architecture_compliance_checker.py",
                description: "运行 AST 静态规则分析。解析所有源代码文件的 import 语法，确保符合定义的架构边界约束：例如核心层（Core）绝对不能导入适配层（Adapter），不允许导入任何服务端数据库库，Dashboard 的 HTML 不得引用 CDN 等。",
                inputs: [
                    { name: "src/ 内所有 Python 源码", path: "file:///Users/lihan/Project/Vibe_Tracing/src/vibe_tracing/" },
                    { name: "output/dashboard.html (检查外部资源依赖)", path: "file:///Users/lihan/Project/Vibe_Tracing/output/dashboard.html" }
                ],
                outputs: [
                    { name: "architecture_compliance_status & violations (违规项列表)", path: "" }
                ],
                explanation: "这是强代码质量管理手段，即使代码运行通过且业务测试通过，如果 AI 违反了设计原则（例如在核心逻辑中擅自引入了特定 Agent API），该校验器会在这一步扫描时拦截并记录为 violated。",
                example: `# 审查 Core 不得依赖特定运行时的导入分析\nfor imported_module in imports:\n    if "claude_code" in imported_module or "hermes" in imported_module:\n        if not is_adapter_file(current_file):\n            violations.append(f"核心代码 {current_file} 越权导入了特定 Agent 库: {imported_module}")`
            },
            {
                id: 9,
                title: "门禁决策评定 (Merge Gate Engine)",
                subtitle: "Phase 09 — 合并状态裁决",
                moduleName: "merge_gate_engine",
                modulePath: "file:///Users/lihan/Project/Vibe_Tracing/src/vibe_tracing/merge_gate_engine.py",
                description: "汇总以上所有步骤产出的 Gaps（追溯缺口）、Risks（安全与配置风险）以及 静态架构违规。利用 RiskAdvisor 决定危害等级，并输入门禁决定机制，裁决是否允许分支合并。",
                inputs: [
                    { name: "merged_gaps & final_risks", path: "" },
                    { name: "architecture_compliance_status", path: "" }
                ],
                outputs: [
                    { name: "gate_decision (pass / conditional / blocked)", path: "" }
                ],
                explanation: "遵循保守决策原则：只要存在未解决的 MUST 级风险、缺口（如必需文件缺失、架构违规、存在失败或缺失的测试），门禁决定就会被下限拦截至 `blocked`（非 0 退出码拦截合并）。仅存在 SHOULD 级警告时，可评定为 `conditional`。",
                example: `# 门禁计算核心决策伪代码\nif has_must_severity_risk or has_unclear_must_constraint:\n    gate_decision = "blocked"\n    reasons.append("存在未满足的硬性架构红线或高危风险")\nelse:\n    gate_decision = "pass"`
            },
            {
                id: 10,
                title: "报告编译与 Dashboard 生成 (Compile & Render)",
                subtitle: "Phase 10 — 治理可视化与交付",
                moduleName: "traceability_report_builder & dashboard_renderer",
                modulePath: "file:///Users/lihan/Project/Vibe_Tracing/src/vibe_tracing/dashboard_renderer.py",
                description: "最终交付物输出阶段。根据汇总事实编译生成最终报告的 traceability_report.json，同时基于模板和数据在 output/ 生成一个单体独立的 dashboard.html 文件，提供所有依赖关系的完整树状渲染和图形化表达。",
                inputs: [
                    { name: "traceability_report.json (编译中结构)", path: "" },
                    { name: "evidence_index.json (构建事实)", path: "file:///Users/lihan/Project/Vibe_Tracing/output/evidence_index.json" }

                outputs: [
                    { name: "traceability_report.json", path: "file:///Users/lihan/Project/Vibe_Tracing/output/traceability_report.json" },

                ],
                explanation: "将追溯状态、测试通过统计、架构合规决策以最直观易懂的方式渲染到单体 HTML 中，该文件脱离后端和 CDN 依赖，保证能在任何离线浏览器中快速双击查阅。返回退出码 (BLOCKED 为 2，PASS 为 0)。",
                example: `# 内嵌数据渲染 dashboard 的核心方式\nhtml_content = template_content.replace(\n    '<script id=\"boot-data-json\" type=\"application/json\">{}<\\/script>',\n    f'<script id=\"boot-data-json\" type=\"application/json\">{json_str}<\\/script>'\n)\noutput_path.write_text(html_content, encoding='utf-8')`

        ];

        // 渲染步骤按钮
        function renderNav() {
            const container = document.getElementById("step-nav-group");
            container.innerHTML = "";
            stepsData.forEach((step, index) => {
                const btn = document.createElement("button");
                btn.className = `step-btn ${index === 0 ? "active" : ""}`;
                btn.onclick = () => selectStep(index);
                btn.innerHTML = `
                    <div class="step-badge">${step.id}</div>
                    <div class="step-btn-text">${step.title.split(' ')[0]}</div>
                    <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
                `;
                container.appendChild(btn);
            });
        }

        // 填充详情数据
        function selectStep(index) {
            // 更新按钮状态
            const buttons = document.querySelectorAll(".step-btn");
            buttons.forEach((btn, idx) => {
                if (idx === index) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });

            const step = stepsData[index];
            const panel = document.getElementById("detail-panel");

            // 格式化输入文件链接
            let inputHtml = "";
            if (step.inputs.length > 0) {
                step.inputs.forEach(input => {
                    const link = input.path ? `<a href="${input.path}">${input.name}</a>` : input.name;
                    inputHtml += `<li class="io-item"><span class="io-dot"></span>${link}</li>`;
                });
            } else {
                inputHtml = `<li class="io-item" style="color:rgba(255,255,255,0.2);">无</li>`;
            }

            // 格式化输出文件链接
            let outputHtml = "";
            if (step.outputs.length > 0) {
                step.outputs.forEach(output => {
                    const link = output.path ? `<a href="${output.path}">${output.name}</a>` : output.name;
                    outputHtml += `<li class="io-item"><span class="io-dot"></span>${link}</li>`;
                });
            } else {
                outputHtml = `<li class="io-item" style="color:rgba(255,255,255,0.2);">无</li>`;
            }

            // 安全过滤 HTML 内容防注入
            const escapeHtml = (text) => {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            };

            panel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-title-group">
                        <div class="detail-subtitle">${step.subtitle}</div>
                        <h2>${step.title}</h2>
                    </div>
                    <div class="detail-module-badge">
                        负责模块: <a href="${step.modulePath}">${step.moduleName}</a>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        步骤功能描述
                    </div>
                    <div class="section-body">
                        ${step.description}
                    </div>
                </div>

                <div class="io-grid">
                    <div class="io-card">
                        <div class="io-card-title input">
                            <span class="io-dot"></span> 输入依赖 / Inputs
                        </div>
                        <ul class="io-list">
                            ${inputHtml}
                        </ul>
                    </div>
                    <div class="io-card">
                        <div class="io-card-title output">
                            <span class="io-dot"></span> 输出产物 / Outputs
                        </div>
                        <ul class="io-list">
                            ${outputHtml}
                        </ul>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                        具体校验逻辑与动作
                    </div>
                    <div class="section-body">
                        ${step.explanation}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
                        代码实现与行为示例
                    </div>
                    <div class="code-panel">
                        <div class="code-header">Python / Logic</div>
                        <pre style="margin: 0; white-space: pre-wrap;"><code>${escapeHtml(step.example)}</code></pre>
                    </div>
                </div>
            `;
        }

        // 初始化
        renderNav();
        selectStep(0);
    </script>
</body>
